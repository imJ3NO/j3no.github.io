<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cyvir — Loading</title>
<style>
@font-face {
  font-family: 'Retropix';
  src: url('retropix.otf') format('opentype');
  font-weight: normal;
  font-style: normal;
  font-display: swap;
}

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --gold: #DAA520;
  --pink: #FD4062;
  --pink-dark: #BC3154;
  --bg: #3d3435;
  --lavender: #E5CBF2;
  --blue: #6ACFF0;
  --blue-dark: #0082C1;
}

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: var(--bg);
}

/* ── LOADER OVERLAY ── */
#loader {
  position: fixed;
  inset: 0;
  background: var(--bg);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 9999;
  border-left: 2px solid var(--gold);
  border-right: 2px solid var(--gold);
  transition: transform 1.1s cubic-bezier(0.76, 0, 0.24, 1);
  will-change: transform;
}

#loader.slide-up {
  transform: translateY(-100%);
}

/* ── COMPASS ASSEMBLY ── */
.compass-wrap {
  position: relative;
  width: 360px;
  height: 360px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.ring-svg {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
}

.ring-outer { animation: spin-cw 12s linear infinite; }
.ring-inner { animation: spin-ccw 18s linear infinite; }

@keyframes spin-cw  { from { transform: rotate(0deg); }   to { transform: rotate(360deg); } }
@keyframes spin-ccw { from { transform: rotate(0deg); }   to { transform: rotate(-360deg); } }

/* ── LOGO CENTER ── */
.logo-center {
  position: relative;
  z-index: 10;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 4px;
  pointer-events: none;
}

.logo-row {
  display: flex;
  align-items: center;
  gap: 8px;
}

.brace {
  font-family: Georgia, serif;
  font-size: 56px;
  font-weight: 700;
  color: var(--blue);
  line-height: 1;
  display: block;
}

.logo-text {
  font-family: 'Retropix', monospace;
  font-size: 24px;
  color: var(--pink);
  letter-spacing: 3px;
}

/* ── PLEASE WAIT ── */
#please-wait {
  position: absolute;
  bottom: 32px;
  right: 40px;
  font-family: 'Retropix', monospace;
  font-size: 13px;
  color: var(--gold);
  letter-spacing: 5px;
  opacity: 1;
  transition: opacity 0.5s ease;
}

#please-wait.hide { opacity: 0; }

#please-wait span {
  animation: blink-dots 1.6s steps(4, end) infinite;
}

@keyframes blink-dots {
  0%   { content: ''; opacity: 0; }
  25%  { opacity: 1; }
  75%  { opacity: 1; }
  100% { opacity: 0; }
}

/* ── PAGE CONTENT (your actual site goes here) ── */
#page {
  position: absolute;
  inset: 0;
  opacity: 0;
  transition: opacity 0.7s ease 0.5s;
  overflow-y: auto;
}

#page.visible { opacity: 1; }

/* ── NAV (matching your existing style) ── */
.navigation {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background-color: var(--pink);
  border-style: solid;
  border-radius: 15px;
  border-color: var(--gold);
  overflow: hidden;
  margin: 10px;
}

.navigation .logo {
  background-color: var(--bg);
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 6px 14px;
  height: 50px;
}

.navigation .logo .brace-sm {
  font-family: Georgia, serif;
  font-size: 22px;
  font-weight: 700;
  color: var(--blue);
  line-height: 1;
}

.navigation .logo .name-sm {
  font-family: 'Retropix', monospace;
  font-size: 13px;
  color: var(--pink);
  letter-spacing: 2px;
}

.nav-links { display: flex; }

.nav-links a {
  color: var(--lavender);
  text-decoration: none;
  text-align: center;
  padding: 11px 3.5vw;
  font-size: 20px;
  font-family: Helvetica, sans-serif;
  opacity: 0;
  transform: translateX(-30px);
  transition:
    opacity 0.45s ease,
    transform 0.55s cubic-bezier(0.34, 1.4, 0.64, 1),
    background-color 0.3s ease,
    color 0.3s ease;
}

.nav-links a.revealed {
  opacity: 1;
  transform: translateX(0);
}

.nav-links a:hover {
  background-color: var(--pink-dark);
  color: var(--gold);
}

/* ── PORTAL BG (stays in place) ── */
.portal {
  position: fixed;
  z-index: 0;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 65vw;
  height: 65vw;
  opacity: 0;
  transition: opacity 1s ease 0.8s;
  pointer-events: none;
  animation: portal-spin 120s linear infinite;
}

.portal.visible { opacity: 1; }

@keyframes portal-spin {
  from { transform: translate(-50%, -50%) rotate(0deg); }
  to   { transform: translate(-50%, -50%) rotate(360deg); }
}

/* ── DEMO HERO CONTENT ── */
.hero {
  position: relative;
  z-index: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  height: 80vh;
  gap: 16px;
  text-align: center;
}

.hero h1 {
  font-family: 'Retropix', monospace;
  font-size: 36px;
  color: var(--blue);
  letter-spacing: 4px;
}

.hero p {
  font-family: Helvetica, sans-serif;
  font-size: 18px;
  color: var(--lavender);
  opacity: 0.75;
}

/* ── VERTICAL SCROLL LINE ── */
.verticalLineParent {
  display: flex;
  align-self: center;
  justify-content: center;
}
.verticalLine {
  margin-top: 12vw;
  background-color: var(--gold);
  width: 5px;
  height: 10vw;
  animation: scrollLine 1.2s ease-in-out 0s infinite;
}
@keyframes scrollLine {
  from { transform: translateY(-100%); }
  to   { transform: translateY(100%); }
}
</style>
</head>
<body>

<!-- ══════════════════════════════════════
     LOADING SCREEN
══════════════════════════════════════ -->
<div id="loader">

  <div class="compass-wrap">

    <!-- Outer ornamental ring -->
    <svg class="ring-svg ring-outer" viewBox="0 0 360 360" xmlns="http://www.w3.org/2000/svg" id="outerRing"></svg>

    <!-- Inner ornamental ring -->
    <svg class="ring-svg ring-inner" viewBox="0 0 360 360" xmlns="http://www.w3.org/2000/svg" id="innerRing"></svg>

    <!-- Logo -->
    <div class="logo-center">
      <div class="logo-row">
        <span class="brace">{</span>
        <span class="logo-text">cyvir</span>
        <span class="brace">}</span>
      </div>
    </div>

  </div>

  <div id="please-wait">PLEASE WAIT<span id="dots">...</span></div>
</div>

<!-- ══════════════════════════════════════
     ACTUAL PAGE CONTENT
══════════════════════════════════════ -->
<div id="page">

  <!-- Portal background (stays centered) -->
  <img class="portal" id="portal" src="circle.png" alt="" aria-hidden="true">

  <!-- Navigation -->
  <nav class="navigation">
    <div class="logo">
      <span class="brace-sm">{</span>
      <span class="name-sm">cyvir</span>
      <span class="brace-sm">}</span>
    </div>
    <div class="nav-links" id="navLinks">
      <a href="index.html">Home</a>
      <a href="skills.html">Skills</a>
      <a href="certificate.html">Certificates</a>
      <a href="works.html">Works</a>
    </div>
  </nav>

  <!-- Replace everything below with your actual page content -->
  <div class="hero">
    <h1>JEPHTHY DOJINO</h1>
    <p>Aspiring Game Developer · BS Information Technology · PLV</p>
  </div>

</div>

<script>
/* ── BUILD SVG RINGS ── */
function makeSVGEl(tag, attrs) {
  const el = document.createElementNS('http://www.w3.org/2000/svg', tag);
  for (const [k, v] of Object.entries(attrs)) el.setAttribute(k, v);
  return el;
}

function buildOuterRing(svg) {
  const cx = 180, cy = 180, r = 158;
  svg.appendChild(makeSVGEl('circle', { cx, cy, r, fill: 'none', stroke: '#DAA520', 'stroke-width': '1.4', opacity: '0.65' }));
  const count = 60;
  for (let i = 0; i < count; i++) {
    const angle = (i / count) * 2 * Math.PI;
    const x = cx + r * Math.sin(angle);
    const y = cy - r * Math.cos(angle);
    if (i % 5 === 0) {
      // star
      const s = 5.5;
      const pts = [
        [x, y - s * 1.7],
        [x + s * 0.45, y - s * 0.45],
        [x + s * 1.7, y],
        [x + s * 0.45, y + s * 0.45],
        [x, y + s * 1.7],
        [x - s * 0.45, y + s * 0.45],
        [x - s * 1.7, y],
        [x - s * 0.45, y - s * 0.45],
      ].map(p => p.join(',')).join(' ');
      svg.appendChild(makeSVGEl('polygon', { points: pts, fill: '#DAA520', opacity: '0.9' }));
    } else if (i % 2 === 0) {
      const ir = r - 9;
      const x2 = cx + ir * Math.sin(angle);
      const y2 = cy - ir * Math.cos(angle);
      svg.appendChild(makeSVGEl('line', { x1: x, y1: y, x2, y2, stroke: '#DAA520', 'stroke-width': '0.9', opacity: '0.45' }));
    }
  }
}

function buildInnerRing(svg) {
  const cx = 180, cy = 180, r = 125;
  svg.appendChild(makeSVGEl('circle', { cx, cy, r, fill: 'none', stroke: '#DAA520', 'stroke-width': '0.7', opacity: '0.3' }));
  for (let i = 0; i < 16; i++) {
    const angle = (i / 16) * 2 * Math.PI;
    const x = cx + r * Math.sin(angle);
    const y = cy - r * Math.cos(angle);
    if (i % 4 === 0) {
      const s = 6;
      const pts = [[x, y-s],[x+s*0.5,y],[x,y+s],[x-s*0.5,y]].map(p=>p.join(',')).join(' ');
      svg.appendChild(makeSVGEl('polygon', { points: pts, fill: 'none', stroke: '#DAA520', 'stroke-width': '1.1', opacity: '0.7' }));
    } else {
      svg.appendChild(makeSVGEl('circle', { cx: x, cy: y, r: '1.5', fill: '#DAA520', opacity: '0.4' }));
    }
  }
}

buildOuterRing(document.getElementById('outerRing'));
buildInnerRing(document.getElementById('innerRing'));

/* ── DOTS ANIMATION ── */
let dotCount = 0;
const dotsEl = document.getElementById('dots');
const dotInterval = setInterval(() => {
  dotCount = (dotCount + 1) % 4;
  dotsEl.textContent = '.'.repeat(dotCount);
}, 400);

/* ── TRIGGER ON LOAD ── */
window.addEventListener('load', () => {
  // Small pause so user actually sees the loader
  setTimeout(() => {
    clearInterval(dotInterval);
    const pw = document.getElementById('please-wait');
    pw.classList.add('hide');

    setTimeout(() => {
      // Slide loader up
      document.getElementById('loader').classList.add('slide-up');

      // Fade page in
      const page = document.getElementById('page');
      page.classList.add('visible');

      // Portal fades in at center
      document.getElementById('portal').classList.add('visible');

      // Nav links fan in one by one
      const links = document.querySelectorAll('#navLinks a');
      links.forEach((a, i) => {
        setTimeout(() => a.classList.add('revealed'), 300 + i * 130);
      });

    }, 500);
  }, 600);
});
</script>
</body>
</html>
